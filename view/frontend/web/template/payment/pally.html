<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>

    <div class="payment-method-content" data-bind="visible: getCode() == isChecked()">
        <!-- ko if: getDescription() -->
        <div class="payment-method-description">
            <p data-bind="text: getDescription()"></p>
        </div>
        <!-- /ko -->

        <!-- ko if: getInstructions() -->
        <div class="payment-method-instructions">
            <p data-bind="text: getInstructions()"></p>
        </div>
        <!-- /ko -->

        <div class="payment-method-note">
            <span data-bind="i18n: 'You will be redirected to the Pally payment page to complete your order.'"></span>
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="click: placeOrder, attr: {title: $t('Place Order')}, enable: (getCode() == isChecked())"
                        disabled>
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
